name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 22

      - name: Backend Install
        run: |
          cd backend
          npm install

      - name: Frontend Install
        run: |
          cd frontend
          npm install

      - name: Frontend Build
        run: |
          cd frontend
          npm run build

      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6

        with:
          context: ./backend
          push: true
          tags: |
            yashwaghmare9766/backend:latest
            yashwaghmare9766/backend:v1

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6

        with:
          context: ./frontend
          push: true
          tags: |
            yashwaghmare9766/frontend:latest
            yashwaghmare9766/frontend:v1