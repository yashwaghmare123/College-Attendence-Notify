name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 22
          

      - name: Backend Install
        run: |

          cd backend

          npm install

      - name: Frontend Install
        run: |

          cd frontend

          npm install

      - name: Frontend Build
        run: |

          cd frontend

          npm run build